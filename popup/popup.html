<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck settings</title>

    <link rel="stylesheet" href= "popup.css">

</head>
    <body>


        <div class = "container">

            <h1>vibeCheck</h1>

            <p class = "subtitle">filter ur feed vibes</p>

            <div class = "settings">

                <label>
                    <input type = "checkbox" id = "enabled" checked>
                    <span>Enable VibeCheck</span>
                </label>
            </div>


            <div class = "setting">
                <label for="threshold">Sensitivity threshold</label>

                <input type = "range" id = "threshold" min = "-5" max = "0" step = "0.1" value = "-2.0">
                <span id = "threshold-val">-2.0</span>

            </div>


            <div class = "setting">
            
                    <label>
                        <input type = "checkbox" id = "block_anger" checked>
                        <span>Block anger</span>
                    </label>
                </div>


            <div class = "setting">
                <label>

                    <input type = "checkbox" id = "block_sadness">
                    <span>Block Sadness</span>
                </label>
            </div>


            <div class = "setting">
                <label>
                    <input type="checkbox" id="block_toxic" checked>
                    <span>Block Toxic</span>
                </label>
            </div>
            <button id = "save">Save settings</button>
            <div id = "status"></div>





            <div class = "stats-box">   

                <div class = "stats-box">

                    <div class = "stats-title">posts filtered</div>
                    <div class = "stats-row">
                        <span>total</span>
                        <span id = "stat-total">0</span>

                </div>


                <div class = "stats-row">
                    <span>toxic</span>
                    <span id = "stat-toxic">0</span>
            </div>

            <div class = "stats-row">

                <span>anger</span>
                <span id = "stat-anger">0</span>

            </div>

            <div class = "stats-row">

                <span>sadness</span>
                <span id = "stat-sadness">0</span>
            </div>


            <button id = "clear-stats">clear stats </button>

            </div>


            <script src = "popup.js"></script>

                
    </body>


</html>
